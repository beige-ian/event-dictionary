name: Deploy Event Dictionary

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 KST (01:00 UTC)
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create service account keys
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/service-account.json
          BQ_KEY='${{ secrets.BQ_SERVICE_ACCOUNT_KEY }}'
          if [ -n "$BQ_KEY" ] && [ "$BQ_KEY" != "null" ]; then
            echo "$BQ_KEY" > /tmp/bq-service-account.json
            echo "BQ_SA_PATH=/tmp/bq-service-account.json" >> $GITHUB_ENV
          fi

      - name: Generate HTML
        run: python3 generate_event_dict.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          GOOGLE_APPLICATION_CREDENTIALS_BQ: ${{ env.BQ_SA_PATH }}
          OUTPUT_HTML: index.html

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
